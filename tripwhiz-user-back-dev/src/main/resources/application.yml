spring:
  application:
    name: tripwhiz-user-back

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:tripwhiz;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 5000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
      enabled: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul

com:
  tripwhiz:
    accessTime: 60
    refreshTime: 10080
    alwaysNew: true
    jwt:
      secret: ${TRIPWHIZ_JWT_SECRET:}
    firebase:
      config-path: ${TRIPWHIZ_FIREBASE_CONFIG_PATH:}
    uploadBasic: ${TRIPWHIZ_UPLOAD_DIR:C:\\upload}
    upload:
      productpath: product
      qrcodepath: qrcode
      storagepath: storage
      movingpath: moving

logging:
  level:
    org.springframework.security.web: WARN

mvc:
  throw-exception-if-no-handler-found: true

web:
  resources:
    add-mappings: false

server:
  port: 8081
  store:
    owner:
      base:
        url: ${TRIPWHIZ_STORE_OWNER_URL:http://localhost:8082}

---
spring:
  config:
    activate:
      on-profile: mariadb
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${TRIPWHIZ_DB_URL}
    username: ${TRIPWHIZ_DB_USERNAME}
    password: ${TRIPWHIZ_DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
